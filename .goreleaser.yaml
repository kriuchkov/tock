version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    binary: tock
    main: ./cmd/tock
    ldflags:
      - -s -w
      - -X github.com/kriuchkov/tock/internal/app/commands.version={{.Version}}
      - -X github.com/kriuchkov/tock/internal/app/commands.commit={{.Commit}}
      - -X github.com/kriuchkov/tock/internal/app/commands.date={{.Date}}
    # Build darwin natively with cgo so the menu bar (fyne.io/systray is
    # Objective-C) and the sqlite backend (go-sqlite3) are compiled in.
    # Requires a macOS runner. Linux stays CGO-free (pure-Go cross-build).
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - repository:
      owner: kriuchkov
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    
    name: tock
    description: "Tock {{ .Tag }} is a simple timetracker for the command line"
    homepage: "https://github.com/kriuchkov/tock"
    license: "GPL-3.0-only"
    directory: Formula
    test: |
      system "#{bin}/tock version"
